services:
  - type: web
    name: mednexai-trackhub
    env: python
    buildCommand: pip install -r requirements/prod.txt && pip install gunicorn && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: /opt/render/project/.venv/bin/gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: DATABASE_URL
        fromDatabase:
          name: trackhub-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: .onrender.com

databases:
  - name: trackhub-db
    plan: free